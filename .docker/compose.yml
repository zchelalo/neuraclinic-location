name: neuraclinic-location

services:
  neuraclinic-location:
    container_name: neuraclinic-location
    restart: unless-stopped
    env_file: ../.env
    build:
      context: ../
      dockerfile: ./.docker/Dockerfile
    ports:
      - 8005:8000
    volumes:
      - ../:/app-src
      - ../certs:/app/certs:ro
    environment:
      ENVIRONMENT: development
      AUTO_RUN_MIGRATIONS: "true"
    depends_on:
      neuraclinic-location-db:
        condition: service_healthy
    networks:
      - neuraclinic-network
      - neuraclinic-location-network

  neuraclinic-location-db:
    image: postgres:17.6
    container_name: neuraclinic-location-db
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: neuraclinic-location
      TZ: America/Hermosillo
    volumes:
      - neuraclinic-location-db-data:/var/lib/postgresql/data
    ports:
      - 5438:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuraclinic-location-network

  neuraclinic-location-adminer:
    image: adminer
    container_name: neuraclinic-location-adminer
    environment:
      TZ: America/Hermosillo
      ADMINER_DESIGN: "ng9"
    ports:
      - 8088:8080
    depends_on:
      neuraclinic-location-db:
        condition: service_started
    networks:
      - neuraclinic-location-network

networks:
  neuraclinic-network:
    external: true
  neuraclinic-location-network:
    driver: bridge

volumes:
  neuraclinic-location-db-data:
    name: neuraclinic-location-db-data
